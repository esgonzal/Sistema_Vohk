<app-loader [loader]="isLoading"></app-loader>
<div class="contenido">
    <div class="button-container">
        <input type="text" [(ngModel)]="searchText" placeholder="Buscar registros..." (input)="searchRecords()">
        <div>
            <button (click)="refresh()">Actualizar</button>
        </div>
    </div>
    <table mat-table [dataSource]="dataSource" matSort class="table">
        <ng-container matColumnDef="Fecha">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Fecha
            </th>
            <td mat-cell *matCellDef="let record">
                {{ formatTimestamp(record.lockDate) }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Usuario">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Usuario
            </th>
            <td mat-cell *matCellDef="let record">
                {{ record.keyName || record.username || record.keyboardPwd || '-' }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Tipo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Tipo
            </th>
            <td mat-cell *matCellDef="let record">
                {{ record.metodo }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Descripcion">
            <th mat-header-cell *matHeaderCellDef>
                Descripción
            </th>
            <td mat-cell *matCellDef="let record">
                <span [style.color]="record.displaySuccess.color">
                    {{ record.displaySuccess.text }}
                </span>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [length]="totalRecords" [pageIndex]="currentPage" [pageSize]="200" [pageSizeOptions]="[200]"
        showFirstLastButtons (page)="pageChanged($event)">
    </mat-paginator>
</div>
