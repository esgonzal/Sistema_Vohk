<div class="pagina_completa" [ngClass]="{'dark-mode': DarkModeService.darkMode}">
    <app-loader [loader]="isLoading"></app-loader>
    <div class="resto" *ngIf="pageLoaded">
        <div class="cerradura">
            <div class="izquierdo">
                <div class="nombre_cerradura">
                    {{Alias}}
                </div>
                <div class="nombre_comunidad" matTooltip="Comunidad a la que pertenece la cerradura"
                    *ngIf="lockGroup !== 'undefined'">
                    Comunidad: {{lockGroup}}
                </div>
                <div class="rol_usuario">
                    <div *ngIf="userType==='110301'">
                        Rol: Administrador Principal
                    </div>
                    <div *ngIf="userType==='110302' && keyRight==='1'">
                        Rol: Administrador Secundario //
                        {{lockService.periodoValidez(Number(startDateDeUser),Number(endDateDeUser))}}
                    </div>
                    <div *ngIf="userType==='110302' && keyRight==='0'">
                        Rol: Usuario // {{lockService.periodoValidez(Number(startDateDeUser),Number(endDateDeUser))}}
                    </div>
                </div>
            </div>
            <div class="derecho">
                <div matTooltip="La cerradura tiene {{Bateria}}% de batería restante">
                    <button><fa-icon [icon]="faBatteryFull"></fa-icon></button>
                </div>
                <div>
                    <div *ngIf="gateway==='1'" matTooltip="La cerradura está conectada a un dispositivo hub">
                        <button style="color: green;"><fa-icon [icon]="faWifi"></fa-icon></button>
                    </div>
                    <div *ngIf="gateway==='0'" matTooltip="La cerradura no está conectada a un dispositivo hub">
                        <button style="color: red;"><fa-icon [icon]="faWifi"></fa-icon></button>
                    </div>
                </div>
                <div *ngIf="(userType==='110301') || (userType==='110302' && keyRight==='1')">
                    <button [matMenuTriggerFor]="menu" aria-label="Settings"><fa-icon [icon]="faGear"></fa-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="editName()" disabled>
                            Editar Nombre
                        </button>
                        <!-- 
                        <button mat-menu-item *ngIf="userType==='110301'" (click)="TransferirLock()"><span>Transferir
                                Dispositivo</span></button>
                        -->
                        <button mat-menu-item *ngIf="(userType==='110301' || (userType==='110302' && keyRight==='1'))  && lockService.checkFeature(featureValue, 22)" (click)="PassageMode()" disabled>
                            <span>Modo de Paso</span>
                        </button>
                        <button mat-menu-item (click)="esencial()" disabled>
                            Datos esenciales
                        </button>
                    </mat-menu>
                </div>
                <div *ngIf="lockService.checkFeature(featureValue, 0)">
                    <button (click)="toTemporalPasscode()" matTooltip="Crea un código con duración de 3 horas" disabled>
                        <fa-icon [icon]="faPlus"></fa-icon>
                    </button>
                </div>
                <div>
                    <button (click)="Unlock()" *ngIf="lockService.checkFeature(featureValue, 10)" matTooltip="Presione para abrir la cerradura remotamente si es que está conectada a un dispositivo hub" disabled>
                        <fa-icon [icon]="faDoorOpen"></fa-icon>
                    </button>
                </div>
            </div>
        </div>
        <div class="funciones_cerradura" *ngIf="(userType==='110301') || (userType==='110302' && keyRight==='1')">
            <div>
                <div class="tablist">
                    <mat-tab-group backgroundColor="primary" color="warn">
                        <!-- EKEYS -->
                        <mat-tab label="Ekeys">
                            <ng-template matTabContent>
                                <app-ekey-table [lockId]="lockId" [accessToken]="accessToken"
                                    [locksOfGroup]="locksOfGroup">
                                </app-ekey-table>
                            </ng-template>
                        </mat-tab>
                        <!-- PASSCODES -->
                        <mat-tab label="Códigos" *ngIf="lockService.checkFeature(featureValue, 0)"
                            [attr.data-tab]="'passcodes'">
                            <ng-template matTabContent>
                                <app-passcode-table [lockId]="lockId" [accessToken]="accessToken">
                                </app-passcode-table>
                            </ng-template>
                        </mat-tab>
                        <!-- CARDS -->
                        <mat-tab label="Tarjetas" *ngIf="lockService.checkFeature(featureValue, 1)"
                            [attr.data-tab]="'cards'">
                            <ng-template matTabContent>
                                <app-card-table [lockId]="lockId" [accessToken]="accessToken">
                                </app-card-table>
                            </ng-template>
                        </mat-tab>
                        <!-- FINGERPRINTS -->
                        <mat-tab label="Huellas" *ngIf="lockService.checkFeature(featureValue, 2)"
                            [attr.data-tab]="'fingerprints'">
                            <ng-template matTabContent>
                                <app-fingerprint-table [lockId]="lockId" [accessToken]="accessToken">
                                </app-fingerprint-table>
                            </ng-template>
                        </mat-tab>
                        <!-- RECORDS -->
                        <mat-tab label="Records">
                            <ng-template matTabContent>
                                <app-record-table [lockId]="lockId" [accessToken]="accessToken">
                                </app-record-table>
                            </ng-template>
                        </mat-tab>
                    </mat-tab-group>
                </div>
            </div>
        </div>
    </div>
</div>
<app-pop-up *ngIf="this.popupService.gateway || this.popupService.cerradoAutomatico || this.popupService.needGateway ||
                  this.popupService.excelFingerprints" style="z-index: 10;"></app-pop-up>

<app-access-modal *ngIf="this.popupService.delete || this.popupService.cambiarNombre || this.popupService.cambiarPeriodo || this.popupService.editarPasscode ||
                    this.popupService.autorizar || this.popupService.desautorizar || this.popupService.changeRemoteEnable || this.popupService.congelar || 
                    this.popupService.descongelar || this.popupService.cardSuccess || this.popupService.ekeySuccess || this.popupService.ekeySuccess2 || 
                    this.popupService.passcodeSuccess || this.popupService.invitation"
    style="z-index: 10;"></app-access-modal>

<app-functions-modal
    *ngIf="this.popupService.needGateway || this.popupService.esencial || this.popupService.excelRecords"
    style="z-index: 10;"></app-functions-modal>

<app-ekey *ngIf="this.popupService.createEkey" style="z-index: 10;"></app-ekey>
<app-passcode *ngIf="this.popupService.createPasscode" style="z-index: 10;"></app-passcode>
<app-card *ngIf="this.popupService.createCard" style="z-index: 10;"></app-card>
<app-passage-mode *ngIf="this.popupService.passageMode" style="z-index: 10;"></app-passage-mode>
<app-transfer-lock *ngIf="this.popupService.transferLock" style="z-index: 10;"></app-transfer-lock>
