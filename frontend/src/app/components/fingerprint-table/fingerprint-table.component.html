<app-loader [loader]="isLoading"></app-loader>
<div class="contenido">
    <div class="button-container">
        <input type="text" [(ngModel)]="searchText" placeholder="Buscar Huellas..." (input)="searchFingerprints()">
        <div>
            <button (click)="refresh()">Actualizar</button>
        </div>
    </div>
    <table mat-table [dataSource]="dataSource" matSort class="table">
        <ng-container matColumnDef="Nombre">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Nombre
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                {{ fingerprint.fingerprintName }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Responsable">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Creador
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                {{ fingerprint.senderUsername }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Fecha">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Fecha
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                {{ formatTimestamp(fingerprint.createDate) }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Periodo_validez">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Período de validez
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                {{ periodoValidez(fingerprint) }}
            </td>
        </ng-container>
        <ng-container matColumnDef="Valido">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
                Estado
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                <span [style.color]="fingerprint.displayStatus.color">
                    {{ fingerprint.displayStatus.text }}
                </span>
            </td>
        </ng-container>
        <ng-container matColumnDef="Botones">
            <th mat-header-cell *matHeaderCellDef>
                Operación
            </th>
            <td mat-cell *matCellDef="let fingerprint">
                <button class="custom-button-eliminar" (click)="borrarFingerprint(fingerprint.fingerprintId)">
                    Eliminar
                </button>
                <button class="custom-button" (click)="cambiarNombreFingerprint(fingerprint.fingerprintId)">
                    Editar Nombre
                </button>
                <button class="custom-button" (click)="cambiarPeriodoFingerprint(fingerprint.fingerprintId)">
                    Editar Período
                </button>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="25" [pageSizeOptions]="[10,25,50,100]" showFirstLastButtons>
    </mat-paginator>
</div>
