<div class="vr-page">
    <div *ngIf="completed" class="vr-success">
        <div class="vr-check-ring">
            ✓
        </div>
        <h2>Contraseña actualizada</h2>
        <p>
            Su contraseña fue cambiada correctamente.
            Ya puede ingresar nuevamente a VÖHK.
        </p>
    </div>
    <div *ngIf="!completed" class="vr-card">
        <div class="vr-card-header">
            <h2>
                Recuperar contraseña
            </h2>
            <p>
                Ingrese una nueva contraseña para su cuenta.
            </p>
        </div>
        <form (ngSubmit)="submitReset()">
            <div class="vr-field">
                <label>
                    Nueva contraseña
                </label>
                <div class="vr-input-wrap">
                    <input type="password" [(ngModel)]="password" name="password" placeholder="Nueva contraseña">
                </div>
            </div>
            <div class="vr-field vr-field--last">
                <label>
                    Confirmar contraseña
                </label>
                <div class="vr-input-wrap">
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Repita la contraseña">
                </div>
            </div>
            <button type="submit" class="vr-submit" [disabled]="isLoading">
                {{ isLoading ? 'Guardando...' : 'Cambiar contraseña' }}
            </button>
        </form>
    </div>
    <div *ngIf="errorMessage" class="vr-error">
        <h3>Error</h3>
        <pre>{{ errorMessage }}</pre>
    </div>
</div>
