<div *ngIf="registrationCompleted && !isLoading">
    <h2>Acceso creado correctamente</h2>
    <p>
        Su código de acceso es:
    </p>
    <h1>#{{ dynamicCode }}</h1>
    <p>
        Utilice este código en el intercomunicador para ingresar.
    </p>
</div>
<div *ngIf="invitation?.status === 'pending' && !registrationCompleted">
    <app-loader [loader]="isLoading"></app-loader>
    <h2>Registro de visita</h2>
    <form (ngSubmit)="submitInvitation()">
        <div>
            <label>Nombre</label>
            <input [(ngModel)]="visitor.name" name="name" required>
        </div>
        <div>
            <label>Email</label>
            <input [(ngModel)]="visitor.email" name="email">
        </div>
        <div>
            <label>Teléfono</label>
            <input [(ngModel)]="visitor.phone" name="phone">
        </div>
        <div>
            <label>Patente</label>
            <input [(ngModel)]="visitor.vehiclePlate" name="vehiclePlate">
        </div>
        <div>
            <label>Fotografía</label>
            <input type="file" accept="image/*" (change)="onPhotoSelected($event)">
        </div>
        <button type="submit">
            Registrar visita
        </button>
    </form>
</div>
<div *ngIf="invitation?.status === 'registered'">
    <h2>Esta invitación ya fue utilizada</h2>
</div>
<div *ngIf="errorMessage">
    <h3>Error</h3>

    <pre>{{ errorMessage }}</pre>
</div>
