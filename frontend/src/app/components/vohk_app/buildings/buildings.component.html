<div class="page">
    <div class="header">
        <div>
            <button (click)="goBack()">
                ← Back
            </button>
            <h1>Buildings</h1>
        </div>
        <button class="primary-btn" (click)="openCreateBuilding()">
            Nueva Torre
        </button>
    </div>
    <div *ngIf="buildings.length === 0" class="empty-state">
        No buildings found.
    </div>
    <div class="cards-grid" *ngIf="buildings.length > 0">
        <div class="card" *ngFor="let building of buildings">
            <h2>{{ building.name }}</h2>
            <p>
                Pisos: {{ building.floor_count }}
            </p>
            <div class="actions">
                <button (click)="manage(building)">
                    Manage
                </button>
                <button (click)="editBuilding(building)">
                    Editar
                </button>
                <button class="danger-btn" (click)="deleteBuilding(building)">
                    Eliminar
                </button>
            </div>
        </div>
    </div>
</div>
