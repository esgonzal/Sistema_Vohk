<div class="page">

    <div class="header">
        <div>
            <button (click)="goBack()">
                ← Back
            </button>
            <h1>Residents</h1>
        </div>
        <button class="primary-btn" (click)="openCreateResident()">
            Nuevo Residente
        </button>
    </div>

    <div *ngIf="residents.length === 0" class="empty-state">

        No residents assigned to this unit.

    </div>

    <div class="cards-grid" *ngIf="residents.length > 0">

        <div class="card" *ngFor="let resident of residents">

            <h2>
                {{ resident.legal_name }}
            </h2>

            <p>
                Email:
                {{ resident.email }}
            </p>

            <p>
                Rut:
                {{ resident.rut }}
            </p>

            <p>
                {{ resident.is_primary ? 'Residente Primario' : 'Residente' }}
            </p>

            <div class="actions">

                <button (click)="editResident(resident)">
                    Editar
                </button>

                <button class="danger-btn" (click)="deleteResident(resident)">
                    Eliminar
                </button>

            </div>

        </div>

    </div>

</div>
