<div class="pagina_completa" [ngClass]="{'dark-mode': DarkModeService.darkMode}">
    <app-loader [loader]="isLoading"></app-loader>
    <div class="form-area">

        <h2 class="titulo">
            Generar múltiples eKeys
        </h2>
        <div class="config-section">
            <select class="full-width" [(ngModel)]="form.type">
                <option value="1">Permanente</option>
                <option value="2">Temporal</option>
            </select>
            <div *ngIf="form.type === '2'" class="dates">
                <div>
                    <label>Fecha inicio</label>
                    <input type="date" [(ngModel)]="form.startDate">
                </div>
                <div>
                    <label>Fecha término</label>
                    <input type="date" [(ngModel)]="form.endDate">
                </div>
            </div>
            <button class="form-button" type="button" (click)="toggleLocks()">
                {{ showLocks ? 'Ocultar cerraduras ▲' : 'Seleccionar cerraduras ▼' }}
            </button>
            <div *ngIf="showLocks" class="locks-container">
                <label *ngFor="let lock of locksOfGroup" class="lock-row">
                    <input type="checkbox" [checked]="isLockSelected(lock.lockId)" (change)="toggleLock(lock,$event)">
                    {{ lock.lockAlias }}
                </label>
            </div>
            <div *ngIf="selectedLocks.length > 0" class="selected-locks">
                <strong>Cerraduras seleccionadas:</strong>
                <ul>
                    <li *ngFor="let lock of selectedLocks">
                        {{ lock.lockAlias }}
                    </li>
                </ul>
            </div>
            <label class="checkbox-row">
                <input type="checkbox" [(ngModel)]="form.notifyEmail">
                Enviar notificación por correo
            </label>
            <label class="checkbox-row">
                <input type="checkbox" [(ngModel)]="form.remoteEnable">
                Apertura remota
            </label>
            <label class="checkbox-row">
                <input type="checkbox" [(ngModel)]="form.keyRight">
                Administrador autorizado
            </label>
        </div>
        <hr>
        <h3>Destinatarios</h3>
        <div class="button-row">
            <button class="import" (click)="fileInput.click()">
                Importar desde Excel
            </button>
            <button class="import" (click)="downloadExcelTemplate()">
                Descargar plantilla
            </button>
            <input hidden #fileInput type="file" accept=".xlsx,.xls,.csv" (change)="onFileSelected($event)">
        </div>
        <table class="ekey-table">
            <thead>
                <tr>
                    <th style="width:15%">
                        Depto
                    </th>
                    <th style="width:25%">
                        Destinatario
                    </th>
                    <th style="width:25%">
                        Nombre eKey
                    </th>
                    <th style="width:25%">
                        Correo notificación
                    </th>
                    <th style="width:10%">
                        Eliminar
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let receiver of receivers; let i=index">
                    <td>
                        <input type="text" [(ngModel)]="receiver.department">
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="receiver.receiver" placeholder="Correo o celular">
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="receiver.keyName">
                    </td>
                    <td>
                        <input type="text" [(ngModel)]="receiver.notificationEmail" placeholder="Correo"
                            [disabled]="!form.notifyEmail || userService.isValidEmail(receiver.receiver)">
                    </td>
                    <td>
                        <button class="custom-button-eliminar" (click)="removeRecipient(i)">
                            X
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="buttons">
            <button class="form-button" (click)="addRecipient()">
                Agregar destinatario
            </button>

            <button class="form-button" (click)="generate()">
                Generar eKeys
            </button>
        </div>
    </div>
</div>
